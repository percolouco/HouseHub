name: Deploy HouseHub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 192.168.1.29
          username: perco
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/container/househub
            git pull
            echo "✓ HouseHub mis à jour"
